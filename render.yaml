services:
  - type: web
    name: kipc-frontend
    runtime: node
    plan: free
    buildCommand: pnpm install && npm run build
    startCommand: pnpm run preview
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

  - type: web
    name: kipc-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: |
      npm install -g pnpm
      pnpm install --shamefully-hoist
      ls -la node_modules
    startCommand: node index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health

  - type: cron
    name: kipc-scraper
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node scripts/cron-scrape.js
    schedule: "0 */8 * * *"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false