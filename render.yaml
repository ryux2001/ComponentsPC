services:
  - type: web
    name: kipc-frontend
    runtime: node
    plan: free
    buildCommand: pnpm install && npm run build
    startCommand: pnpm run preview
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

  - type: web
    name: kipc-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: |
      npm install -g pnpm
      pnpm install
      echo "=== VERIFICANDO EXPRESS ==="
      ls -la node_modules/express 2>/dev/null || echo "Express no encontrado en node_modules"
      echo "=== ESTRUCTURA DE NODE_MODULES ==="
      ls -la node_modules/
      mkdir -p node_modules/.bin
    startCommand: node index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_PATH
        value: /opt/render/project/src/server/node_modules
    healthCheckPath: /api/health

  - type: cron
    name: kipc-scraper
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node scripts/cron-scrape.js
    schedule: "0 */8 * * *"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false